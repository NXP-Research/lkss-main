#
# Some potentially note worthy comments:
#
# * for a binary, if the 'tag' property is not specified, it is assumed
# that the latest release should be used.
#
# * use the 'alias' property whenever you wish to change the name of the
# downloaded binary or cloned repository. For repositories used by the
# parser scripts this is mandatory.
#
# * for repositories with a large number of commits (e.g. Linux),
# it's recommended to set the clone depth via the 'depth' property.

repositories:
  - name: lkss-linux
    remote: https://github.com/NXP-Research
    branch: lkss-6.19.y
    alias: $LINUX_DIR
    depth: 10

binaries:
  - remote: https://github.com/nxp-imx/mfgtools
    variants:
      - name: uuu
        platform: linux
        alias: $UNIX_UUU_NAME
      - name: uuu.exe
        platform: wsl
        alias: $WINDOWS_UUU_NAME

  - remote: https://github.com/NXP-Research/lkss-buildroot
    name: rootfs.ext2
    alias: $ROOTFS_NAME

  - remote: https://github.com/NXP-Research/lkss-buildroot
    name: imx9-boot-sd.bin
    alias: $BOOT_CONTAINER_NAME
